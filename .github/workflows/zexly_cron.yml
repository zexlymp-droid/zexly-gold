name: ZEXLY METHOD PRO V6.0

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  zexly-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests yfinance pytz

      - name: Execute Zexly Oracle
        run: python zexly_oracle.py
