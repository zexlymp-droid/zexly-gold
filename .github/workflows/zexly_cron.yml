name: ZEXLY VISION PRO

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  run-vision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install requests yfinance pytz playwright
          playwright install chromium
      - name: Run Script
        run: python zexly_vision.py
