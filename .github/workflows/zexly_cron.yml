name: ZEXLY METHOD BOT

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore offset cache
        uses: actions/cache@v3
        with:
          path: |
            tg_offset.json
            zexly_channel.json
          key: tg-offset-${{ github.run_id }}
          restore-keys: tg-offset-

      - name: Install Dependencies
        run: |
          pip install requests yfinance pytz numpy pandas python-dotenv tzdata matplotlib Pillow playwright
          playwright install chromium

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHARTIMG_KEY: ${{ secrets.CHARTIMG_KEY }}
          ZEXLY_CHANNEL: ${{ secrets.ZEXLY_CHANNEL }}
        run: python zexly_vision.py

      - name: Save offset cache
        uses: actions/cache@v3
        with:
          path: |
            tg_offset.json
            zexly_channel.json
          key: tg-offset-${{ github.run_id }}
