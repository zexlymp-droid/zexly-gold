name: ZEXLY Cloud Monitoring

on:
  schedule:
    - cron: '0 * * * *' # Berjalan otomatis setiap 1 jam
  workflow_dispatch: # Tombol manual untuk jalankan kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests yfinance pytz
      - name: Run ZEXLY Deep Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python zexly_cloud.py

