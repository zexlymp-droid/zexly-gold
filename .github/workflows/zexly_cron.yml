name: ZEXLY VISION CLOUD

on:
  schedule:
    - cron: '*/5 * * * *' # Setiap 15 menit
  workflow_dispatch:

jobs:
  run-zexly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install requests yfinance pytz
      - name: Execute Vision
        run: python zexly_vision.py
